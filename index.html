<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=https://2ripetrolina-pe.sistemaasgard.com.br/app/v1/#/acompanhamento-online">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="canonical" href="https://2ripetrolina-pe.sistemaasgard.com.br/app/v1/#/acompanhamento-online">

  <title>Redirecionando...</title>

  <style>
    :root {
      --bg: #f7e0c6;
      --card: #ffffff;
      --text: #2b1d12;
      --muted: #6f5a45;
      --accent: #8b5a2b;
      --accent-soft: rgba(139, 90, 43, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }

    .page {
      width: 100%;
      max-width: 560px;
      text-align: center;
      animation: fadeUp 0.7s ease forwards;
    }

    .hero-img {
      width: min(100%, 420px);
      height: auto;
      display: block;
      margin: 0 auto 28px;
      object-fit: contain;
    }

    .card {
      width: 100%;
      max-width: 460px;
      margin: 0 auto;
      padding: 42px 34px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(139, 90, 43, 0.16);
      box-shadow: 0 24px 80px rgba(80, 45, 18, 0.18);
      backdrop-filter: blur(14px);
      text-align: center;
    }

    .logo {
      width: 68px;
      height: 68px;
      margin: 0 auto 22px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      background: var(--accent-soft);
      border: 1px solid rgba(139, 90, 43, 0.28);
      color: var(--accent);
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -1px;
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.1rem);
      margin-bottom: 12px;
      letter-spacing: -0.04em;
    }

    p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .loader {
      width: 42px;
      height: 42px;
      margin: 0 auto 28px;
      border-radius: 50%;
      border: 3px solid rgba(139, 90, 43, 0.16);
      border-top-color: var(--accent);
      animation: spin 0.9s linear infinite;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 22px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    a:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
    }

    .small {
      display: block;
      margin-top: 18px;
      font-size: 0.82rem;
      color: #8a745f;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <img 
      class="hero-img"
      src="https://raw.githubusercontent.com/2ripetrolina/acompanhamento/refs/heads/main/bg.avif"
      alt="Ilustração do 2º RI Petrolina"
    >

    <section class="card">
      <div class="logo">2ºRI</div>

      <h1>Redirecionando...</h1>

      <p>
        Você está sendo encaminhado automaticamente para
        <strong>2º RI Petrolina</strong>.
      </p>

      <div class="loader" aria-label="Carregando"></div>

      <a href="https://2ripetrolina-pe.sistemaasgard.com.br/app/v1/#/acompanhamento-online">
        Acessar agora
      </a>

      <span class="small">
        Caso nada aconteça, clique no botão acima.
      </span>
    </section>
  </main>
</body>
</html>
