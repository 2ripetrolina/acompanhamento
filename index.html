<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=https://2ripetrolina-pe.sistemaasgard.com.br/app/v1/#/acompanhamento-online">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="canonical" href="https://2ripetrolina-pe.sistemaasgard.com.br/app/v1/#/acompanhamento-online">

  <title>Redirecionando...</title>

  <style>
    :root {
      --bg: #0f0f0f;
      --card: #171717;
      --text: #f5f5f5;
      --muted: #a3a3a3;
      --accent: #d4af37;
      --accent-soft: rgba(212, 175, 55, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(212, 175, 55, 0.12), transparent 35%),
        linear-gradient(135deg, #080808, #141414);
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      padding: 42px 34px;
      border-radius: 28px;
      background: rgba(23, 23, 23, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(14px);
      text-align: center;
      animation: fadeUp 0.7s ease forwards;
    }

    .logo {
      width: 68px;
      height: 68px;
      margin: 0 auto 22px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      background: var(--accent-soft);
      border: 1px solid rgba(212, 175, 55, 0.32);
      color: var(--accent);
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -1px;
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.1rem);
      margin-bottom: 12px;
      letter-spacing: -0.04em;
    }

    p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .loader {
      width: 42px;
      height: 42px;
      margin: 0 auto 28px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.12);
      border-top-color: var(--accent);
      animation: spin 0.9s linear infinite;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 22px;
      border-radius: 999px;
      background: var(--accent);
      color: #111;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    a:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
    }

    .small {
      display: block;
      margin-top: 18px;
      font-size: 0.82rem;
      color: #737373;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="logo">2ºRI</div>

    <h1>Redirecionando...</h1>

    <p>
      Você está sendo encaminhado automaticamente para
      <strong>2º RI Petrolina</strong>.
    </p>

    <div class="loader" aria-label="Carregando"></div>

    <a href="https://github.com/2ripetrolina/acompanhamento">
      Acessar agora
    </a>

    <span class="small">
      Caso nada aconteça, clique no botão acima.
    </span>
  </main>
</body>
</html>
